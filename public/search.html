<!DOCTYPE html>
<!-- search.html — Public found items search page
     Loads all approved found items on page open, then re-fetches when the
     user submits the search form. Filtering by keyword and category happens
     on the server — the query parameters are passed to GET /api/items. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Found Items – School Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">

  <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="brand" aria-label="School Lost and Found — go to homepage">🔍 School Lost &amp; Found</a>
      <div class="nav-links">
        <!-- Active link highlighted in green to show current page -->
        <a href="/search.html"         style="color:#43B02A;font-weight:700">Found Items</a>
        <a href="/search-missing.html" class="hide-mobile">Missing Items</a>
        <div id="nav-auth"></div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <div class="page-header">
        <h1>Search Found Items</h1>
        <p>Browse items that have been turned in on campus, or search by keyword and category.</p>
      </div>

      <!-- ── Search form ──────────────────────────────────────────────────── -->
      <!-- aria-labels on these inputs because there are no visible <label> elements -->
      <div class="search-bar">
        <form id="search-form">
          <input  class="form-input search-input" type="text" id="keyword"
                  placeholder="Search by name, description, or location…"
                  aria-label="Search found items by keyword, description, or location">
          <select class="form-select category-select" id="category" aria-label="Filter by category">
            <option value="">All Categories</option>
            <option>Electronics</option>
            <option>Clothing</option>
            <option>Books &amp; Supplies</option>
            <option>Keys &amp; ID Cards</option>
            <option>Bags &amp; Backpacks</option>
            <option>Sports Equipment</option>
            <option>Jewelry &amp; Accessories</option>
            <option>Other</option>
          </select>
          <button type="submit" class="btn btn-primary">🔍 Search</button>
          <!-- Clear button — only shown when active filters are applied -->
          <button type="button" id="clear-btn" class="btn btn-ghost hidden">Clear</button>
        </form>
      </div>

      <!-- Result count shown above the grid -->
      <div id="result-count" class="text-sm text-muted mb-4 hidden"></div>

      <!-- Item cards injected here by loadItems() -->
      <div id="content">
        <div class="loading-center"><div class="spinner" role="status" aria-label="Loading items"></div></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>© 2026 School Lost &amp; Found System.</p></div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    // Fetch items from the API and render the card grid
    async function loadItems(keyword, category) {
      const content = document.getElementById('content');
      const countEl = document.getElementById('result-count');
      content.innerHTML = '<div class="loading-center"><div class="spinner" role="status" aria-label="Loading items"></div></div>';
      countEl.classList.add('hidden');

      try {
        // Build the query string — only append params that have values
        let url = '/items?';
        if (keyword)  url += `keyword=${encodeURIComponent(keyword)}&`;
        if (category) url += `category=${encodeURIComponent(category)}`;

        const items = await api.get(url);

        // Show result count
        countEl.textContent = `${items.length} item${items.length !== 1 ? 's' : ''} found`;
        countEl.classList.remove('hidden');

        if (items.length === 0) {
          content.innerHTML = `
            <div class="empty-state">
              <div class="icon">📦</div>
              <h3>No items found</h3>
              <p>${keyword || category ? 'Try different search terms.' : 'No items have been reported yet.'}</p>
            </div>`;
          return;
        }

        // Render a grid of item cards
        content.innerHTML = `<div class="items-grid">${items.map(itemCard).join('')}</div>`;
      } catch (err) {
        content.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    // Build the HTML for a single found item card
    function itemCard(item) {
      // Show the photo if one was uploaded, otherwise fall back to a category emoji
      const img = item.photo
        ? `<img src="/uploads/${item.photo}" alt="${item.itemName}">`
        : `<span title="${item.category}">${categoryEmoji(item.category)}</span>`;
      return `
        <div class="item-card">
          <div class="item-card-img">${img}</div>
          <div class="item-card-body">
            <div class="item-card-top">
              <span class="item-card-name">${item.itemName}</span>
              <span class="badge badge-category">${item.category}</span>
            </div>
            <p class="item-card-desc">${item.description}</p>
            <div class="item-meta">
              <div class="item-meta-row"><span class="icon">📍</span> ${item.locationFound}</div>
              <div class="item-meta-row"><span class="icon">📅</span> ${formatDate(item.dateFound)}</div>
            </div>
            <a href="/item.html?id=${item.id}" class="btn btn-primary w-full">View Details</a>
          </div>
        </div>`;
    }

    // Re-fetch when the search form is submitted
    document.getElementById('search-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const kw  = document.getElementById('keyword').value.trim();
      const cat = document.getElementById('category').value;
      // Show the Clear button only when a filter is active
      document.getElementById('clear-btn').classList.toggle('hidden', !kw && !cat);
      loadItems(kw, cat);
    });

    // Clear button resets both inputs and reloads all items
    document.getElementById('clear-btn').addEventListener('click', function() {
      document.getElementById('keyword').value  = '';
      document.getElementById('category').value = '';
      this.classList.add('hidden');
      loadItems('', '');
    });

    // Load all approved found items on initial page open
    loadItems('', '');
  </script>
</body>
</html>
