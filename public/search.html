<!DOCTYPE html>
<!-- search.html — Public found items search page -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Found Items – Green Level Lost &amp; Found</title>
  <link rel="stylesheet" href="/vendor/fonts/fonts.css">
  <link rel="stylesheet" href="/vendor/material-symbols/material-symbols.css">
  <link rel="stylesheet" href="/css/tailwind-local.css">
  <script>

    window.tailwind = window.tailwind || {};
    tailwind.config = {
      theme: { extend: {
        colors: {
          "primary": "#006c49", "on-primary": "#ffffff",
          "primary-container": "#10b981", "on-primary-container": "#00422b",
          "surface": "#f4fbf4", "surface-bright": "#f4fbf4",
          "surface-container-lowest": "#ffffff", "surface-container-low": "#eef6ee",
          "surface-container": "#e8f0e9", "surface-container-high": "#e3eae3",
          "surface-container-highest": "#dde4dd", "surface-variant": "#dde4dd",
          "on-surface": "#161d19", "on-surface-variant": "#3c4a42",
          "outline": "#6c7a71", "outline-variant": "#bbcabf",
          "inverse-surface": "#2b322d",
        },
        fontFamily: { "headline": ["'Plus Jakarta Sans'", "sans-serif"] },
        maxWidth: { "container": "1280px" },
      }}
    }
  </script>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; line-height: 1; display: inline-flex; align-items: center; vertical-align: middle; }
    .material-symbols-outlined.filled { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.25rem; }
  </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 bg-inverse-surface border-b border-white/5" style="box-shadow:0 2px 12px rgba(0,0,0,0.18)">
    <div class="max-w-container mx-auto px-4 md:px-6 h-16 flex items-center justify-between gap-4">
      <a href="/index.html" class="flex items-center gap-2 font-headline font-bold text-base text-white hover:text-primary-container transition-colors shrink-0" aria-label="Green Level Lost &amp; Found — go to homepage">
        <span class="material-symbols-outlined filled text-primary-container" style="font-size:20px">search</span>
        <span class="hidden md:flex items-baseline gap-1">
          <span>Green Level</span>
          <span>Lost &amp; Found</span>
        </span>
      </a>
      <div class="flex items-center gap-1 shrink-0">
        <a href="/search.html" class="text-white text-sm font-semibold px-3 py-1.5 rounded-lg bg-white/15">Found Items</a>
        <a href="/search-missing.html" class="hidden md:block text-white/75 hover:text-white hover:bg-white/10 px-3 py-1.5 rounded-lg text-sm transition-colors">Missing Items</a>
        <div id="nav-auth" class="flex items-center gap-2 ml-1"></div>
      </div>
    </div>
  </nav>

  <div class="flex flex-1 pt-16">
    <!-- Left filter sidebar -->
    <aside class="browse-sidebar hidden md:flex flex-col w-64 bg-surface-container-low border-r border-outline-variant shrink-0 p-4 gap-3 fixed left-0 top-16 bottom-0 overflow-y-auto z-10">
      <div class="font-headline font-bold text-sm text-on-surface px-1 pt-1 mb-1">Filters</div>
      <div>
        <div class="text-xs font-semibold text-on-surface-variant uppercase tracking-wider px-1 mb-2">Category</div>
        <select id="category" aria-label="Filter by category"
                class="w-full px-3 py-2.5 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all">
          <option value="">All Categories</option>
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Books &amp; Supplies</option>
          <option>Keys &amp; ID Cards</option>
          <option>Bags &amp; Backpacks</option>
          <option>Sports Equipment</option>
          <option>Jewelry &amp; Accessories</option>
          <option>Other</option>
        </select>
      </div>
      <button onclick="applyFilters()" class="w-full flex items-center justify-center gap-2 bg-primary text-white py-2.5 rounded-xl font-semibold text-sm hover:bg-primary/90 transition-colors">
        <span class="material-symbols-outlined" style="font-size:16px">filter_list</span>
        Apply Filters
      </button>
      <button id="clear-btn" onclick="clearFilters()" class="w-full flex items-center justify-center gap-2 bg-surface-container text-on-surface-variant py-2.5 rounded-xl font-semibold text-sm hover:bg-surface-container-high transition-colors hidden">
        <span class="material-symbols-outlined" style="font-size:16px">close</span>
        Clear Filters
      </button>
    </aside>

    <!-- Main content -->
    <main class="browse-shell-main flex-1 md:ml-64 bg-surface-bright overflow-y-auto">
      <div class="w-full max-w-[1200px] p-4 md:p-8">
        <div class="mb-5">
          <h1 class="font-headline font-bold text-2xl text-on-surface mb-1">Search Found Items</h1>
          <p class="text-on-surface-variant text-sm">Browse items that have been turned in on campus.</p>
        </div>
        <form id="search-form" class="surface-card p-3 mb-5">
          <div class="relative">
            <span class="search-field-icon material-symbols-outlined absolute top-1/2 -translate-y-1/2 text-outline" style="font-size:18px">search</span>
            <input class="search-field-input w-full pr-4 py-2.5 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/60 text-sm focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/15 transition-all"
                   type="text" id="keyword" placeholder="Search found items by name, description, or location…" aria-label="Search found items by keyword">
          </div>
        </form>
        <!-- Mobile search row -->
        <div class="md:hidden flex gap-2 mb-4">
          <select id="category-mobile" aria-label="Filter by category"
                  class="px-3 py-2.5 rounded-xl border border-outline-variant bg-surface-container-lowest text-on-surface text-sm focus:outline-none focus:border-primary transition-all">
            <option value="">All Categories</option>
            <option>Electronics</option><option>Clothing</option>
            <option>Books &amp; Supplies</option><option>Keys &amp; ID Cards</option>
            <option>Bags &amp; Backpacks</option><option>Sports Equipment</option>
            <option>Jewelry &amp; Accessories</option><option>Other</option>
          </select>
          <button onclick="applyFiltersMobile()" class="px-4 py-2.5 bg-primary text-white rounded-xl text-sm font-semibold">
            <span class="material-symbols-outlined" style="font-size:18px">filter_list</span>
          </button>
        </div>
        <div id="result-count" class="text-sm text-on-surface-variant mb-4 hidden"></div>
        <div id="content">
          <div class="loading-center"><div class="spinner" role="status" aria-label="Loading items"></div></div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js?v=1.0.3"></script>
  <script>
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function safeAttr(str) {
      return escapeHtml(str).replace(/`/g, '&#96;');
    }

    async function loadItems(keyword, category) {
      const content = document.getElementById('content');
      const countEl = document.getElementById('result-count');
      content.innerHTML = '<div class="loading-center"><div class="spinner" role="status" aria-label="Loading items"></div></div>';
      countEl.classList.add('hidden');
      try {
        let url = '/items?';
        if (keyword)  url += `keyword=${encodeURIComponent(keyword)}&`;
        if (category) url += `category=${encodeURIComponent(category)}`;
        const items = await api.get(url);
        countEl.textContent = `${items.length} item${items.length !== 1 ? 's' : ''} found`;
        countEl.classList.remove('hidden');
        if (items.length === 0) {
          const emptyMsg = keyword || category
            ? `Nothing matched your search — try different keywords or a broader category.`
            : `No items have been turned in yet. Check back soon.`;
          content.innerHTML = `<div class="empty-state"><div class="icon float"><span class="material-symbols-outlined">inventory_2</span></div><h3>No items found</h3><p>${emptyMsg}</p></div>`;
          return;
        }
        content.innerHTML = `<div class="items-grid">${items.map((item, i) => itemCard(item, i)).join('')}</div>`;
      } catch (err) {
        content.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function itemCard(item, index) {
      const img = item.photo
        ? `<img src="/uploads/${safeAttr(item.photo)}" alt="${safeAttr(item.itemName)}">`
        : `<span title="${safeAttr(item.category)}">${categoryEmoji(item.category)}</span>`;
      const i = Math.min(index, 7);
      return `
        <div class="item-card card-stagger" style="--i:${i}">
          <div class="item-card-img">${img}
            <span class="badge badge-category" style="position:absolute;top:10px;left:10px;backdrop-filter:blur(4px)">${escapeHtml(item.category)}</span>
          </div>
          <div class="item-card-body">
            <div class="item-card-top">
              <span class="item-card-name">${escapeHtml(item.itemName)}</span>
            </div>
            <p class="item-card-desc">${escapeHtml(item.description)}</p>
            <div class="item-meta">
              <div class="item-meta-row"><span class="material-symbols-outlined">location_on</span> ${escapeHtml(item.locationFound)}</div>
              <div class="item-meta-row"><span class="material-symbols-outlined">calendar_today</span> ${formatDate(item.dateFound)}</div>
            </div>
            <a href="/item.html?id=${encodeURIComponent(item.id)}" class="btn btn-primary w-full">View Details</a>
          </div>
        </div>`;
    }

    function applyFilters() {
      const kw  = document.getElementById('keyword').value.trim();
      const cat = document.getElementById('category').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !kw && !cat);
      loadItems(kw, cat);
    }

    function applyFiltersMobile() {
      const kw  = document.getElementById('keyword').value.trim();
      const cat = document.getElementById('category-mobile').value;
      loadItems(kw, cat);
    }

    function clearFilters() {
      document.getElementById('keyword').value  = '';
      document.getElementById('category').value = '';
      document.getElementById('clear-btn').classList.add('hidden');
      loadItems('', '');
    }

    document.getElementById('search-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const kw  = document.getElementById('keyword').value.trim();
      const cat = document.getElementById('category').value;
      document.getElementById('clear-btn').classList.toggle('hidden', !kw && !cat);
      loadItems(kw, cat);
    });

    loadItems('', '');
  </script>
</body>
</html>
