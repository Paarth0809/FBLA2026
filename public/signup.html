<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – School Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div style="text-align:center;margin-bottom:1.5rem">
        <a href="/index.html" class="brand" style="font-size:1.25rem;display:inline-flex" aria-label="School Lost and Found — go to homepage">🔍 School Lost &amp; Found</a>
      </div>

      <h2>Create an account</h2>
      <p class="sub">Join to report found items and submit claims.</p>

      <div id="error-box" class="alert alert-error hidden" role="alert"></div>

      <form id="signup-form">
        <div class="form-group">
          <label class="form-label" for="name">Full Name <span class="req">*</span></label>
          <input class="form-input" type="text" id="name" placeholder="Your full name" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="email">Email Address <span class="req">*</span></label>
          <input class="form-input" type="email" id="email" placeholder="you@school.edu" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password <span class="req">*</span></label>
          <input class="form-input" type="password" id="password" placeholder="At least 6 characters" required minlength="6">
          <span class="form-hint">Minimum 6 characters</span>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirm">Confirm Password <span class="req">*</span></label>
          <input class="form-input" type="password" id="confirm" placeholder="Repeat your password" required>
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem">
          Create Account
        </button>
      </form>

      <div class="auth-link">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    // If already logged in, redirect away
    document.addEventListener('userLoaded', function(e) {
      if (e.detail) window.location.href = '/';
    });

    document.getElementById('signup-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn      = document.getElementById('submit-btn');
      const errorBox = document.getElementById('error-box');
      errorBox.classList.add('hidden');

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;

      if (password !== confirm) {
        errorBox.textContent = 'Passwords do not match.';
        errorBox.classList.remove('hidden');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Creating account…';

      try {
        await api.post('/auth/signup', { name, email, password });
        window.location.href = '/';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
