<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Details – School Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">

  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="brand">🔍 School Lost &amp; Found</a>
      <div class="nav-links">
        <a href="/search.html"         class="hide-mobile">Found Items</a>
        <a href="/search-missing.html" class="hide-mobile">Missing Items</a>
        <div id="nav-auth"></div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container" style="max-width:900px">
      <a href="/search.html" class="btn btn-ghost btn-sm mb-6">← Back to Search</a>
      <div id="content">
        <div class="loading-center"><div class="spinner"></div></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>© 2026 School Lost &amp; Found System.</p></div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('id');

    // Holds the item once loaded — shared between loadItem() and updateClaimArea()
    let loadedItem = null;

    // Updates the claim area based on current auth state and item status.
    // Called from two places to handle whichever resolves last (item or user).
    function updateClaimArea() {
      const area = document.getElementById('claim-area');
      if (!area || !loadedItem) return;
      if (loadedItem.status !== 'approved') return;

      if (currentUser) {
        area.innerHTML = `
          <a href="/claim.html?id=${loadedItem.id}&type=found" class="btn btn-primary btn-lg w-full mt-4">
            📋 This Is Mine — Submit a Claim
          </a>`;
      } else {
        area.innerHTML = `
          <div class="alert alert-info">
            <span>ℹ️</span>
            <span><a href="/login.html?redirect=/item.html?id=${loadedItem.id}" style="font-weight:600;color:#1e40af">Sign in</a>
            to submit a claim for this item.</span>
          </div>`;
      }
    }

    // Registered at top level so the listener is always in place before either
    // async call (loadUser or loadItem) resolves. Handles: item loads before user.
    document.addEventListener('userLoaded', updateClaimArea);

    async function loadItem() {
      const content = document.getElementById('content');
      if (!itemId) {
        content.innerHTML = '<div class="alert alert-error">No item ID provided.</div>';
        return;
      }
      try {
        const item = await api.get(`/items/${itemId}`);
        document.title = `${item.itemName} – School Lost & Found`;
        loadedItem = item;
        render(item);
        // Call directly in case userLoaded already fired before loadItem resolved.
        updateClaimArea();
      } catch (err) {
        content.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function render(item) {
      const img = item.photo
        ? `<img src="/uploads/${item.photo}" alt="${item.itemName}">`
        : `<span style="font-size:5rem">${categoryEmoji(item.category)}</span>`;

      const claimedBanner = (item.status === 'claimed')
        ? `<div class="alert alert-success mb-4">✓ This item has been claimed and returned to its owner.</div>`
        : '';

      document.getElementById('content').innerHTML = `
        ${claimedBanner}
        <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
          <h1 style="font-size:1.75rem;font-weight:800">${item.itemName}</h1>
          ${statusBadge(item.status)}
        </div>
        <div class="detail-grid">
          <div class="detail-img">${img}</div>
          <div>
            <div class="detail-fields">
              <div class="detail-field">
                <div class="detail-label">Category</div>
                <div class="detail-value"><span class="badge badge-category">${item.category}</span></div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Description</div>
                <div class="detail-value">${item.description}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">📍 Where It Was Found</div>
                <div class="detail-value">${item.locationFound}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">📅 Date Found</div>
                <div class="detail-value">${formatDate(item.dateFound)}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Reported By</div>
                <div class="detail-value">${item.submitterName}</div>
              </div>
            </div>

            <div id="claim-area" class="mt-6">
              <!-- Claim button injected by updateClaimArea() -->
            </div>
          </div>
        </div>`;
    }

    loadItem();
  </script>
</body>
</html>
