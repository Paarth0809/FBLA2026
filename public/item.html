<!DOCTYPE html>
<!-- item.html — Found item detail page
     Reads ?id= from the URL, fetches the item from GET /api/items/:id,
     and renders its full details. If the item is approved and the user is
     logged in, a "Submit a Claim" button is shown.

     Race-condition note: nav.js (userLoaded) and loadItem() are both async.
     Either one can resolve first. updateClaimArea() is called from both so
     the claim button always appears regardless of which resolves last. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Details – School Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">

  <!-- ── Navbar ──────────────────────────────────────────────────────────── -->
  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="brand">🔍 School Lost &amp; Found</a>
      <div class="nav-links">
        <a href="/search.html"         class="hide-mobile">Found Items</a>
        <a href="/search-missing.html" class="hide-mobile">Missing Items</a>
        <div id="nav-auth"></div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container" style="max-width:900px">
      <a href="/search.html" class="btn btn-ghost btn-sm mb-6">← Back to Search</a>

      <!-- Item content injected by render() after the API call resolves -->
      <div id="content">
        <div class="loading-center"><div class="spinner" role="status" aria-label="Loading item"></div></div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>© 2026 School Lost &amp; Found System.</p></div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    // Read the item ID from the URL query string (e.g. /item.html?id=abc-123)
    const params = new URLSearchParams(window.location.search);
    const itemId = params.get('id');

    // Holds the item once loaded — shared between loadItem() and updateClaimArea()
    let loadedItem = null;

    // updateClaimArea — injects the correct claim UI based on login state and item status.
    // Called from both the userLoaded event and after loadItem() resolves, because either
    // one can finish first depending on network timing.
    function updateClaimArea() {
      const area = document.getElementById('claim-area');
      if (!area || !loadedItem) return;        // not ready yet — the other call will handle it
      if (loadedItem.status !== 'approved') return; // claimed/rejected items don't need a claim button

      if (currentUser) {
        // Logged-in user: show the claim button linking to claim.html with this item's ID
        area.innerHTML = `
          <a href="/claim.html?id=${loadedItem.id}&type=found" class="btn btn-primary btn-lg w-full mt-4">
            📋 This Is Mine — Submit a Claim
          </a>`;
      } else {
        // Logged-out visitor: prompt them to sign in first
        area.innerHTML = `
          <div class="alert alert-info">
            <span>ℹ️</span>
            <span><a href="/login.html?redirect=/item.html?id=${loadedItem.id}" style="font-weight:600;color:#43B02A">Sign in</a>
            to submit a claim for this item.</span>
          </div>`;
      }
    }

    // Register the listener before any async calls so it's always in place
    document.addEventListener('userLoaded', updateClaimArea);

    async function loadItem() {
      const content = document.getElementById('content');
      if (!itemId) {
        content.innerHTML = '<div class="alert alert-error">No item ID provided.</div>';
        return;
      }
      try {
        const item = await api.get(`/items/${itemId}`);
        document.title = `${item.itemName} – School Lost & Found`;
        loadedItem = item;
        render(item);
        // Call directly in case userLoaded already fired before this resolved
        updateClaimArea();
      } catch (err) {
        content.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    // Builds and injects the full item detail layout into #content
    function render(item) {
      // Show photo if uploaded, otherwise display a large category emoji
      const img = item.photo
        ? `<img src="/uploads/${item.photo}" alt="${item.itemName}">`
        : `<span style="font-size:5rem">${categoryEmoji(item.category)}</span>`;

      // Show a success banner when the item has already been claimed
      const claimedBanner = (item.status === 'claimed')
        ? `<div class="alert alert-success mb-4">✓ This item has been claimed and returned to its owner.</div>`
        : '';

      document.getElementById('content').innerHTML = `
        ${claimedBanner}
        <div class="flex items-center justify-between mb-6 flex-wrap gap-4">
          <h1 style="font-size:1.75rem;font-weight:800">${item.itemName}</h1>
          ${statusBadge(item.status)}
        </div>
        <div class="detail-grid">
          <div class="detail-img">${img}</div>
          <div>
            <div class="detail-fields">
              <div class="detail-field">
                <div class="detail-label">Category</div>
                <div class="detail-value"><span class="badge badge-category">${item.category}</span></div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Description</div>
                <div class="detail-value">${item.description}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">📍 Where It Was Found</div>
                <div class="detail-value">${item.locationFound}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">📅 Date Found</div>
                <div class="detail-value">${formatDate(item.dateFound)}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">Reported By</div>
                <div class="detail-value">${item.submitterName}</div>
              </div>
            </div>

            <!-- Claim button area — populated by updateClaimArea() -->
            <div id="claim-area" class="mt-6">
              <!-- Claim button injected by updateClaimArea() -->
            </div>
          </div>
        </div>`;
    }

    loadItem();
  </script>
</body>
</html>
