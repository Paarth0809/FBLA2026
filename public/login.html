<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – School Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <div style="text-align:center;margin-bottom:1.5rem">
        <a href="/index.html" class="brand" style="font-size:1.25rem;display:inline-flex">🔍 School Lost &amp; Found</a>
      </div>

      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to report items or submit claims.</p>

      <div id="error-box" class="alert alert-error hidden"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="you@school.edu" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem">
          Sign In
        </button>
      </form>

      <div class="auth-link">
        Don't have an account? <a href="/signup.html">Create one</a>
      </div>

      <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #e5e7eb">
        <p class="text-sm text-muted text-center mb-2">Demo accounts:</p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem">
          <button onclick="fillDemo('admin@school.edu','admin123')"    class="btn btn-ghost btn-sm" style="border:1px solid #e5e7eb">⚙️ Admin</button>
          <button onclick="fillDemo('student@school.edu','student123')" class="btn btn-ghost btn-sm" style="border:1px solid #e5e7eb">👤 Student 1</button>
          <button onclick="fillDemo('student2@school.edu','student123')" class="btn btn-ghost btn-sm" style="border:1px solid #e5e7eb">👤 Student 2</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    // If already logged in, redirect away
    document.addEventListener('userLoaded', function(e) {
      if (e.detail) window.location.href = getRedirect();
    });

    function getRedirect() {
      return new URLSearchParams(window.location.search).get('redirect') || '/';
    }

    function fillDemo(email, password) {
      document.getElementById('email').value    = email;
      document.getElementById('password').value = password;
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn      = document.getElementById('submit-btn');
      const errorBox = document.getElementById('error-box');
      errorBox.classList.add('hidden');
      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        await api.post('/auth/login', {
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        });
        window.location.href = getRedirect();
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
