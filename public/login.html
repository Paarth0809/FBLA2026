<!DOCTYPE html>
<!-- login.html — Sign-in page
     Accepts email + password, calls POST /api/auth/login, and redirects the
     user back to whatever page they came from (stored in ?redirect= query param).
     Also has quick-fill buttons for the three demo accounts. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – School Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Brand link at the top of the auth card -->
      <div style="text-align:center;margin-bottom:1.5rem">
        <a href="/index.html" class="brand" style="font-size:1.25rem;display:inline-flex" aria-label="School Lost and Found — go to homepage">🔍 School Lost &amp; Found</a>
      </div>

      <h2>Welcome back</h2>
      <p class="sub">Sign in to your account to report items or submit claims.</p>

      <!-- Error box — hidden by default, shown with role="alert" so screen readers announce it -->
      <div id="error-box" class="alert alert-error hidden" role="alert"></div>

      <!-- Login form — submits via JS to avoid a full page reload -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="you@school.edu" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="submit-btn" class="btn btn-primary btn-full" style="margin-top:0.5rem">
          Sign In
        </button>
      </form>

      <!-- Link to the signup page -->
      <div class="auth-link">
        Don't have an account? <a href="/signup.html">Create one</a>
      </div>

      <!-- Demo account quick-fill buttons for judging/demonstration -->
      <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid #e5e7eb">
        <p class="text-sm text-muted text-center mb-2">Demo accounts:</p>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.5rem">
          <button onclick="fillDemo('admin@school.edu','admin123')"     class="btn btn-ghost btn-sm" style="border:1px solid #e5e7eb" aria-label="Fill in admin demo credentials">⚙️ Admin</button>
          <button onclick="fillDemo('student@school.edu','student123')" class="btn btn-ghost btn-sm" style="border:1px solid #e5e7eb" aria-label="Fill in Student 1 demo credentials">👤 Student 1</button>
          <button onclick="fillDemo('student2@school.edu','student123')" class="btn btn-ghost btn-sm" style="border:1px solid #e5e7eb" aria-label="Fill in Student 2 demo credentials">👤 Student 2</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    // If the user is already logged in, skip this page and go to the redirect target
    document.addEventListener('userLoaded', function(e) {
      if (e.detail) window.location.href = getRedirect();
    });

    // Read the ?redirect= parameter so we can send the user back after login.
    // Defaults to '/' (homepage) if no redirect was specified.
    function getRedirect() {
      return new URLSearchParams(window.location.search).get('redirect') || '/';
    }

    // Fills the email and password fields with a demo account's credentials
    function fillDemo(email, password) {
      document.getElementById('email').value    = email;
      document.getElementById('password').value = password;
    }

    // Handle form submission — call the API and redirect on success
    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn      = document.getElementById('submit-btn');
      const errorBox = document.getElementById('error-box');
      errorBox.classList.add('hidden');
      btn.disabled    = true;
      btn.textContent = 'Signing in…';

      try {
        await api.post('/auth/login', {
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value
        });
        window.location.href = getRedirect();
      } catch (err) {
        // Show the error message returned by the server (e.g. "Invalid email or password.")
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        btn.disabled    = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
