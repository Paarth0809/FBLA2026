<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Submissions – School Lost & Found</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page">

  <nav class="navbar">
    <div class="container">
      <a href="/index.html" class="brand">🔍 School Lost &amp; Found</a>
      <div class="nav-links">
        <a href="/search.html"         class="hide-mobile">Found Items</a>
        <a href="/search-missing.html" class="hide-mobile">Missing Items</a>
        <div id="nav-auth"></div>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">

      <div class="admin-header">
        <div>
          <h1>📋 My Submissions</h1>
          <p class="text-muted">Track the status of items you've reported.</p>
        </div>
        <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
          <a href="/report.html"         class="btn btn-primary btn-sm">+ Report Found Item</a>
          <a href="/report-missing.html" class="btn btn-outline btn-sm">+ Report Missing Item</a>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('found',  this)">📦 Found Items I Reported</button>
        <button class="tab"        onclick="switchTab('missing', this)">⚠️ Missing Items I Reported</button>
      </div>

      <!-- Tab: Found Items -->
      <div id="tab-found" class="tab-panel active">
        <div id="found-content"><div class="loading-center"><div class="spinner"></div></div></div>
      </div>

      <!-- Tab: Missing Items -->
      <div id="tab-missing" class="tab-panel">
        <div id="missing-content"><div class="loading-center"><div class="spinner"></div></div></div>
      </div>

    </div>
  </main>

  <footer class="footer">
    <div class="container"><p>© 2026 School Lost &amp; Found System.</p></div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/nav.js"></script>
  <script>
    // ── Auth guard ────────────────────────────────────────────────────────────
    document.addEventListener('userLoaded', function(e) {
      if (!e.detail) {
        window.location.href = '/login.html?redirect=/my-submissions.html';
        return;
      }
      loadFound();
      loadMissing();
    });

    // ── Tab switching ─────────────────────────────────────────────────────────
    function switchTab(name, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    // ── Status explanation shown below each badge ─────────────────────────────
    const STATUS_HINT = {
      pending:  'Waiting for an admin to review your submission.',
      approved: 'Your submission is live and visible to everyone.',
      rejected: 'Your submission was not approved by an admin.',
      claimed:  'This item has been claimed by its owner.',
      found:    'This item has been marked as found and returned.'
    };

    // ── Found Items tab ───────────────────────────────────────────────────────
    async function loadFound() {
      const el = document.getElementById('found-content');
      try {
        const items = await api.get('/items/mine');

        if (items.length === 0) {
          el.innerHTML = `
            <div class="empty-state">
              <div class="icon">📦</div>
              <h3>No found items yet</h3>
              <p class="text-muted">When you report a found item, its status will appear here.</p>
              <a href="/report.html" class="btn btn-primary mt-4">Report a Found Item</a>
            </div>`;
          return;
        }

        el.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Photo</th><th>Item</th><th>Category</th>
                  <th>Location Found</th><th>Date Found</th><th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${items.map(foundRow).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function foundRow(item) {
      const thumb = item.photo
        ? `<img src="/uploads/${item.photo}" alt="" style="width:44px;height:44px;object-fit:cover;border-radius:6px;border:1px solid #e5e7eb">`
        : `<span style="font-size:1.6rem">${categoryEmoji(item.category)}</span>`;

      return `<tr>
        <td>${thumb}</td>
        <td><a href="/item.html?id=${item.id}" style="color:#2563eb;font-weight:600">${item.itemName}</a></td>
        <td>${item.category}</td>
        <td>${item.locationFound}</td>
        <td>${formatDate(item.dateFound)}</td>
        <td>
          ${statusBadge(item.status)}
          <div class="form-hint mt-1">${STATUS_HINT[item.status] || ''}</div>
        </td>
      </tr>`;
    }

    // ── Missing Items tab ─────────────────────────────────────────────────────
    async function loadMissing() {
      const el = document.getElementById('missing-content');
      try {
        const items = await api.get('/missing-items/mine');

        if (items.length === 0) {
          el.innerHTML = `
            <div class="empty-state">
              <div class="icon">🔎</div>
              <h3>No missing items yet</h3>
              <p class="text-muted">When you report a missing item, its status will appear here.</p>
              <a href="/report-missing.html" class="btn btn-primary mt-4">Report a Missing Item</a>
            </div>`;
          return;
        }

        el.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Item</th><th>Category</th>
                  <th>Last Seen</th><th>Date</th><th>Status</th>
                </tr>
              </thead>
              <tbody>
                ${items.map(missingRow).join('')}
              </tbody>
            </table>
          </div>`;
      } catch (err) {
        el.innerHTML = `<div class="alert alert-error">${err.message}</div>`;
      }
    }

    function missingRow(item) {
      return `<tr>
        <td><a href="/missing-item.html?id=${item.id}" style="color:#2563eb;font-weight:600">${item.itemName}</a></td>
        <td>${item.category}</td>
        <td>${item.lastSeenLocation}</td>
        <td>${formatDate(item.lastSeenDate)}</td>
        <td>
          ${statusBadge(item.status)}
          <div class="form-hint mt-1">${STATUS_HINT[item.status] || ''}</div>
        </td>
      </tr>`;
    }
  </script>
</body>
</html>
